<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Price Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #ffd700;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .price-card {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
        }

        .price-label {
            color: #b0b0b0;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .price-value {
            font-size: 3.5em;
            font-weight: bold;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .price-time {
            color: #888;
            font-size: 0.95em;
        }

        .chart-card {
            background: rgba(255, 215, 0, 0.05);
            border: 2px solid rgba(255, 215, 0, 0.2);
            border-radius: 15px;
            padding: 25px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .time-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            padding: 10px 18px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            background: transparent;
            color: #ffffff;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            border-color: rgba(255, 215, 0, 0.6);
        }

        button.active {
            background: #ffd700;
            color: #1e1e2e;
            border-color: #ffd700;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        .status {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .status.live {
            color: #4ade80;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Gold Price</h1>
        <p class="subtitle">Daily EUR prices from bullionbypost.eu</p>

        <div class="price-card">
            <div class="price-label">Current Price</div>
            <div class="price-value" id="price">€4492.80</div>
            <div class="price-time" id="time">2026-03-12 13:03:07</div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <div>Price History</div>
                <div class="time-buttons" id="buttons-container">
                    <button data-period="1d" onclick="changePeriod('1d')" class="active">1D</button>
                    <button data-period="1w" onclick="changePeriod('1w')">1W</button>
                    <button data-period="1m" onclick="changePeriod('1m')">1M</button>
                    <button data-period="1y" onclick="changePeriod('1y')">1Y</button>
                    <button data-period="all" onclick="changePeriod('all')">All</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
            <div class="status" id="status">Connecting...</div>
        </div>
    </div>

    <script>
        // Embedded data updated hourly by backend
        const chartLabels = ["Mar 12"];
        const chartPrices = [4492.8];
        let currentChart = null;
        let currentPeriod = '1d';

        async function loadChart(period) {
            try {
                // Use only embedded chart data (backend updates this every hour)
                const labels = chartLabels;
                const prices = chartPrices;
                
                if (prices.length === 0) {
                    document.getElementById('status').textContent = '📊 Accumulating daily data';
                    return;
                }

                const singlePoint = prices.length === 1;

                if (singlePoint) {
                    document.getElementById('status').textContent = 'Only 1 daily point collected so far';
                    document.getElementById('status').className = 'status';
                }

                if (currentChart) {
                    currentChart.destroy();
                }

                const ctx = document.getElementById('chart').getContext('2d');
                currentChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'EUR Price',
                            data: prices,
                            borderColor: '#ffd700',
                            backgroundColor: 'rgba(255, 215, 0, 0.1)',
                            borderWidth: 2,
                            fill: !singlePoint,
                            tension: 0.3,
                            showLine: !singlePoint,
                            pointRadius: singlePoint ? 10 : 4,
                            pointHoverRadius: singlePoint ? 12 : 6,
                            pointBorderWidth: singlePoint ? 3 : 1,
                            pointBackgroundColor: '#ffd700',
                            pointBorderColor: '#1e1e2e'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: { color: '#fff' }
                            }
                        },
                        scales: {
                            y: {
                                grid: { color: 'rgba(255,215,0,0.1)' },
                                ticks: { color: '#b0b0b0' }
                            },
                            x: {
                                grid: { color: 'rgba(255,215,0,0.1)' },
                                ticks: { color: '#b0b0b0' }
                            }
                        }
                    }
                });
                if (!singlePoint) {
                    document.getElementById('status').textContent = '✓ Daily prices loaded';
                    document.getElementById('status').className = 'status live';
                }
            } catch (e) {
                document.getElementById('status').textContent = '⚠ Error loading chart';
                console.error('Chart error:', e);
            }
        }

        function changePeriod(period) {
            currentPeriod = period;
            
            // Update period buttons safely by explicit period key.
            const buttons = document.querySelectorAll('#buttons-container button');
            buttons.forEach(btn => {
                if (!btn || !btn.classList) {
                    return;
                }
                btn.classList.toggle('active', btn.dataset.period === period);
            });

            loadChart(period);
        }

        // Initialize
        window.addEventListener('load', () => {
            // Load embedded chart data (updated hourly by backend)
            loadChart('1d');
            // Update button states
            document.querySelector('[data-period="1d"]').classList.add('active');
        });
    </script>
</body>
</html>
